site_name: Grundejerforeningen Pomosa
site_url: https://www.grundejerforeningenpomosa.dk
use_directory_urls: true
theme:
    name: material
    language: da
    features:
        - navigation.instant
        - navigation.tracking
        - navigation.sections

    font:
        text: Roboto
        code: Roboto Mono
    palette:
        - scheme: default
          primary: indigo
          accent: indigo
          toggle:
              icon: material/brightness-7
              name: Switch to dark mode
        - scheme: slate
          primary: black
          accent: white
          toggle:
              icon: material/brightness-4
              name: Switch to light mode

copyright: Copyright &copy; 2025 Grundejerforeningen Pomosa - <a href="mailto:post@grundejerforeningenpomosa.dk">post@grundejerforeningenpomosa.dk</a>

markdown_extensions:
    - attr_list
    - abbr
    - md_in_html
    - pymdownx.snippets
    - pymdownx.keys
    - pymdownx.highlight:
          anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.superfences:
          custom_fences:
              - name: mermaid
                class: mermaid
                format: !!python/name:pymdownx.superfences.fence_code_format
    - tables
    - smarty
    - admonition
    - pymdownx.details
    - pymdownx.magiclink:
          repo_url_shortener: true
plugins:
    - search:
          lang: 
            - da
    - macros