site_name: Grundejerforeningen Pomosa
site_url: https://www.grundejerforeningenpomosa.dk
use_directory_urls: true
theme:
    name: material
    language: da
    features:
        - navigation.instant
        - navigation.tracking
        # - navigation.tracking
        # - navigation.tabs
        # - navigation.top
        # - navigation.tabs.sticky
        - navigation.sections
        # - navigation.expand
        # - navigation.footer
        # - navigation.prune
        # - navigation.tracking
        # - content.code.annotate
        # - content.code.copy
        # - toc.follow
        # - toc.integrate
        # - search.share
        # - search.highlight
        # - search.suggest
        # - announce.dismiss

    font:
        text: Roboto
        code: Roboto Mono
    palette:
        - scheme: slate
          primary: black
          accent: white
          toggle:
              icon: material/brightness-4
              name: Switch to light mode
        - scheme: default
          primary: indigo
          accent: indigo
          toggle:
              icon: material/brightness-7
              name: Switch to dark mode
copyright: Copyright &copy; 2023 Grundejerforeningen Pomosa - <a href="mailto:post@grundejerforeningenpomosa.dk">post@grundejerforeningenpomosa.dk</a>

markdown_extensions:
    - attr_list
    - abbr
    - md_in_html
    - pymdownx.snippets
    - pymdownx.keys
    - pymdownx.highlight:
          anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.superfences:
          custom_fences:
              - name: mermaid
                class: mermaid
                format: !!python/name:pymdownx.superfences.fence_code_format
    - tables
    - smarty
    - admonition
    - pymdownx.details
    - pymdownx.magiclink:
          repo_url_shortener: true
    - pymdownx.emoji:
          emoji_index: !!python/name:materialx.emoji.twemoji
          emoji_generator: !!python/name:materialx.emoji.to_svg     
plugins:
    - search:
          lang: 
            - da
  